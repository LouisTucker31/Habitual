<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <filter id="noise" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="linearRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch" result="noiseOut"/>
    <feColorMatrix type="saturate" values="0" in="noiseOut" result="grey"/>
    <feBlend in="SourceGraphic" in2="grey" mode="normal"/>
  </filter>
  <rect width="256" height="256" filter="url(#noise)" fill="#080d1a"/>
</svg>
